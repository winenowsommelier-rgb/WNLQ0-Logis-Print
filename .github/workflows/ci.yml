name: CI

on:
  push:
    branches: [main, work]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check merge markers
        run: npm run check:merge-markers

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
